name: MeroSadak PRO Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Select deploy target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - worker
          - frontend
      environment:
        description: "Environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  NODE_VERSION: "20"
  NODE_NO_WARNINGS: 1

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# PRE-FLIGHT CHECKS
# ============================================================
jobs:
  preflight:
    name: рЯФН Environment & Secrets Check
    runs-on: ubuntu-latest
    outputs:
      secrets_status: ${{ steps.check_secrets.outputs.status }}
      worker_configured: ${{ steps.check_secrets.outputs.worker_ok }}
      firebase_configured: ${{ steps.check_secrets.outputs.firebase_ok }}
      admin_configured: ${{ steps.check_secrets.outputs.admin_ok }}
      upstash_configured: ${{ steps.check_secrets.outputs.upstash_ok }}
      gemini_configured: ${{ steps.check_secrets.outputs.gemini_ok }}
      missing_count: ${{ steps.check_secrets.outputs.missing_count }}
      optional_missing_count: ${{ steps.check_secrets.outputs.optional_missing_count }}
      configured_count: ${{ steps.check_secrets.outputs.configured_count }}
      total_count: ${{ steps.check_secrets.outputs.total_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check required secrets
        id: check_secrets
        run: |
          echo "рЯФН Verifying required secrets and environment variables..."
          echo ""

          REQUIRED_MISSING=0
          OPTIONAL_MISSING=0
          CONFIGURED=0
          TOTAL=0

          echo "============================================="
          echo "  рЯФР SECRETS STATUS CHECK"
          echo "============================================="
          echo ""

          echo "--- вШБпЄП CLOUDFLARE WORKER ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "вЬЕ CLOUDFLARE_API_TOKEN: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "worker_ok=true" >> $GITHUB_OUTPUT
          else
            echo "вЭМ CLOUDFLARE_API_TOKEN: Missing (required for worker deploy)"
            REQUIRED_MISSING=$((REQUIRED_MISSING + 1))
            echo "worker_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- рЯФ• FIREBASE ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "вЬЕ FIREBASE_SERVICE_ACCOUNT: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "firebase_ok=true" >> $GITHUB_OUTPUT
          else
            echo "вЭМ FIREBASE_SERVICE_ACCOUNT: Missing (required for frontend deploy)"
            REQUIRED_MISSING=$((REQUIRED_MISSING + 1))
            echo "firebase_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- рЯЫ°пЄП ADMIN SECRET ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.ADMIN_SECRET }}" ]; then
            echo "вЬЕ ADMIN_SECRET: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "admin_ok=true" >> $GITHUB_OUTPUT
          else
            echo "вЭМ ADMIN_SECRET: Missing (required for admin API)"
            REQUIRED_MISSING=$((REQUIRED_MISSING + 1))
            echo "admin_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- рЯТЊ UPSTASH REDIS ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.UPSTASH_REDIS_REST_URL }}" ] && [ -n "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" ]; then
            echo "вЬЕ UPSTASH_REDIS_REST_URL + TOKEN: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "upstash_ok=true" >> $GITHUB_OUTPUT
          else
            echo "вЭМ UPSTASH_REDIS_REST_URL or TOKEN: Missing (required for rate limiting & cache)"
            REQUIRED_MISSING=$((REQUIRED_MISSING + 1))
            echo "upstash_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- рЯ§Ц GEMINI AI ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "вЬЕ GEMINI_API_KEY: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "gemini_ok=true" >> $GITHUB_OUTPUT
          else
            echo "вЪ†пЄП GEMINI_API_KEY: Missing (translation falls back to dictionary)"
            OPTIONAL_MISSING=$((OPTIONAL_MISSING + 1))
            echo "gemini_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "============================================="
          echo "  рЯУК SUMMARY"
          echo "============================================="
          echo "Total secrets checked: $TOTAL"
          echo "вЬЕ Configured: $CONFIGURED"
          echo "вЭМ Required missing: $REQUIRED_MISSING"
          echo "вЪ†пЄП Optional missing: $OPTIONAL_MISSING"
          echo ""

          echo "missing_count=$REQUIRED_MISSING" >> $GITHUB_OUTPUT
          echo "optional_missing_count=$OPTIONAL_MISSING" >> $GITHUB_OUTPUT
          echo "configured_count=$CONFIGURED" >> $GITHUB_OUTPUT
          echo "total_count=$TOTAL" >> $GITHUB_OUTPUT

          if [ "$REQUIRED_MISSING" -eq 0 ]; then
            echo "вЬЕ All required secrets configured - ready to deploy!"
            echo "status=ready" >> $GITHUB_OUTPUT
          else
            echo "вЭМ $REQUIRED_MISSING required secret(s) missing - deploy will fail!"
            echo "status=missing_required" >> $GITHUB_OUTPUT
          fi

      - name: Display environment summary
        run: |
          echo "рЯУЛ Environment Summary"
          echo "====================="
          echo "Node.js Version: ${{ env.NODE_VERSION }}"
          echo "Deploy Target: ${{ github.event.inputs.deploy_target || 'auto (push)' }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Service URLs:"
          echo "  Worker:   https://dor-progress.banjays.workers.dev"
          echo "  Frontend: https://dor-progress.web.app"
          echo "  Diagnostic: https://dor-progress.banjays.workers.dev/api/admin/config-check"

# ============================================================
# WORKER DEPLOYMENT
# ============================================================
  worker:
    name: вШБпЄП Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [preflight]
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'worker' ||
      github.event_name == 'workflow_dispatch'

    outputs:
      deploy_status: ${{ steps.worker_deploy.outputs.status }}
      deploy_url: ${{ steps.verify_worker.outputs.url }}
      build_time: ${{ steps.build_time.outputs.duration }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm run security-check

      - name: Type check (TypeScript)
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build timestamp
        id: build_time
        run: |
          START_TIME=$SECONDS
          echo "start_time=$START_TIME" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Workers
        id: worker_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --outdir=dist
          vars: |
            BUILD_ID
            COMMIT_SHA
            DEPLOY_TIMESTAMP
            FIREBASE_PROJECT_ID
            FIREBASE_API_KEY
            FIREBASE_AUTH_DOMAIN
            FIREBASE_PROJECT_NUMBER
            FIREBASE_APP_ID
            RECAPTCHA_SITE_KEY
            RECAPTCHA_SECRET_KEY
            PUBLISHED_SHEET_ID
            UPSTASH_REDIS_REST_URL
            UPSTASH_REDIS_REST_TOKEN
            GEMINI_API_KEY
            ADMIN_SECRET
            GOOGLE_CLOUD_API_KEY
            API_BASE_URL
            VAPID_PUBLIC_KEY
            VAPID_PRIVATE_KEY
          secrets: |
            UPSTASH_REDIS_REST_URL
            UPSTASH_REDIS_REST_TOKEN
            GEMINI_API_KEY
            ADMIN_SECRET
            GOOGLE_CLOUD_API_KEY
            API_BASE_URL
            VAPID_PUBLIC_KEY
            VAPID_PRIVATE_KEY
            FIREBASE_API_KEY
            FIREBASE_AUTH_DOMAIN
            FIREBASE_PROJECT_NUMBER
            FIREBASE_APP_ID
            RECAPTCHA_SITE_KEY
            RECAPTCHA_SECRET_KEY
            PUBLISHED_SHEET_ID
        env:
          BUILD_ID: v$(node -p "require('./package.json').version")
          COMMIT_SHA: ${{ github.sha }}
          DEPLOY_TIMESTAMP: ${{ github.run_started_at }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_NUMBER: ${{ secrets.FIREBASE_PROJECT_NUMBER }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
        continue-on-error: false

      - name: Calculate build time
        if: always()
        run: |
          DURATION=$((SECONDS - ${{ steps.build_time.outputs.start_time }}))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          echo "вП±пЄП Worker deploy completed in ${DURATION}s"

      - name: Verify Worker deployment
        if: steps.worker_deploy.outcome == 'success'
        id: verify_worker
        run: |
          echo "рЯФН Verifying Cloudflare Worker..."
          URL="https://dor-progress.banjays.workers.dev"

          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
              echo "вЬЕ Worker is responding (HTTP $HTTP_CODE)"
              echo "url=$URL" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "вП≥ Attempt $i/5 - HTTP $HTTP_CODE (waiting 10s)..."
            sleep 10
          done

          echo "вЪ†пЄП Worker not responding after 5 attempts"
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Upload worker build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-dist
          path: dist/
          retention-days: 7

# ============================================================
# FRONTEND DEPLOYMENT (Firebase Hosting - Static)
# ============================================================
  frontend:
    name: рЯО® Frontend (Firebase Hosting)
    runs-on: ubuntu-latest
    needs: [preflight]
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'frontend' ||
      github.event_name == 'workflow_dispatch'

    outputs:
      deploy_status: ${{ steps.firebase_deploy.outputs.status }}
      firebase_url: ${{ steps.verify_frontend.outputs.url }}
      build_time: ${{ steps.build_time.outputs.duration }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build timestamp
        id: build_time
        run: |
          START_TIME=$SECONDS
          echo "start_time=$START_TIME" >> $GITHUB_OUTPUT

      - name: Install dependencies (needed for Firebase CLI)
        run: npm ci

      - name: Deploy to Firebase Hosting
        id: firebase_deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: ${{ github.event.inputs.environment == 'dev' && 'dev' || 'live' }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_CLI_PREV: 1
        continue-on-error: false

      - name: Calculate build time
        if: always()
        run: |
          DURATION=$((SECONDS - ${{ steps.build_time.outputs.start_time }}))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          echo "вП±пЄП Frontend deploy completed in ${DURATION}s"

      - name: Verify Firebase deployment
        if: steps.firebase_deploy.outcome == 'success'
        id: verify_frontend
        run: |
          echo "рЯФН Verifying Firebase Hosting..."
          URL="https://dor-progress.web.app"

          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "вЬЕ Frontend is live (HTTP $HTTP_CODE)"
              echo "url=$URL" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "вП≥ Attempt $i/5 - HTTP $HTTP_CODE (waiting 10s)..."
            sleep 10
          done

          echo "вЪ†пЄП Frontend not responding after 5 attempts"
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Upload frontend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            index.html
            sw.v2.js
            manifest.json
            logo.png
            dor/
          retention-days: 7

# ============================================================
# MONITORING & STATUS CHECKER
# ============================================================
  monitoring-check:
    name: рЯУК Monitoring & Status Checker
    runs-on: ubuntu-latest
    needs: [worker, frontend]
    if: always()

    steps:
      - name: Run full status check
        run: |
          echo "============================================="
          echo "  рЯФН DOR-PROGRESS STATUS CHECK"
          echo "============================================="
          echo ""

          PASS=0
          FAIL=0
          SKIP=0

          check_service() {
            local name=$1
            local url=$2
            local expected=${3:-200}
            local timeout=${4:-10}

            echo -n "Checking $name... "
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time $timeout "$url" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "$expected" ]; then
              echo "вЬЕ HTTP $HTTP_CODE"
              PASS=$((PASS + 1))
            elif [ "$HTTP_CODE" = "000" ]; then
              echo "вП≥ Not ready yet"
              SKIP=$((SKIP + 1))
            else
              echo "вЭМ HTTP $HTTP_CODE (expected $expected)"
              FAIL=$((FAIL + 1))
            fi
          }

          echo "--- вШБпЄП WORKER ---"
          check_service "Cloudflare Worker" "https://dor-progress.banjays.workers.dev"
          # Admin config-check returns 401 without auth (that's healthy - route exists)
          echo -n "Checking Worker Config API... "
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://dor-progress.banjays.workers.dev/api/admin/config-check" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
            echo "вЬЕ HTTP $HTTP_CODE (route responding)"
            PASS=$((PASS + 1))
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "вП≥ Not ready yet"
            SKIP=$((SKIP + 1))
          else
            echo "вЭМ HTTP $HTTP_CODE (expected 200 or 401)"
            FAIL=$((FAIL + 1))
          fi
          echo ""

          echo "--- рЯО® FRONTEND ---"
          check_service "Firebase Hosting" "https://dor-progress.web.app"
          echo ""

          echo "--- рЯФІ ENVIRONMENT ---"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Deploy target: ${{ github.event.inputs.deploy_target || 'auto' }}"
          echo "Environment: ${{ github.event.inputs.environment || 'prod' }}"
          echo ""

          echo "============================================="
          echo "  рЯУК STATUS SUMMARY"
          echo "============================================="
          echo "вЬЕ Passed: $PASS"
          echo "вЭМ Failed: $FAIL"
          echo "вП≥ Skipped: $SKIP"
          echo ""

          if [ "$FAIL" -gt 0 ]; then
            echo "вЪ†пЄП $FAIL service(s) not responding"
            echo "рЯТ° UptimeRobot continues monitoring: https://uptimerobot.com/ZaSzISaXMt"
          elif [ "$SKIP" -gt 0 ]; then
            echo "вДєпЄП Some services still warming up (Render takes 2-5 min)"
          else
            echo "вЬЕ All services operational!"
          fi

# ============================================================
# DEPLOY SUMMARY
# ============================================================
  deploy-summary:
    name: рЯУЭ Deploy Summary
    runs-on: ubuntu-latest
    needs: [preflight, worker, frontend, monitoring-check]
    if: always()

    steps:
      - name: Generate deployment summary
        run: |
          echo "## рЯЪА dor-progress Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.head_commit.message || 'Manual deploy' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy target:** ${{ github.event.inputs.deploy_target || 'auto (push)' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'prod' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### рЯФР Secrets Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status | Impact |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| вШБпЄП CLOUDFLARE_API_TOKEN | ${{ needs.preflight.outputs.worker_configured == 'true' && 'вЬЕ Configured' || 'вЭМ Missing' }} | ${{ needs.preflight.outputs.worker_configured == 'true' && 'Worker deploys' || 'Worker deploy fails' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| рЯФ• FIREBASE_SERVICE_ACCOUNT | ${{ needs.preflight.outputs.firebase_configured == 'true' && 'вЬЕ Configured' || 'вЭМ Missing' }} | ${{ needs.preflight.outputs.firebase_configured == 'true' && 'Frontend deploys' || 'Frontend deploy fails' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| рЯЫ°пЄП ADMIN_SECRET | ${{ needs.preflight.outputs.admin_configured == 'true' && 'вЬЕ Configured' || 'вЭМ Missing' }} | ${{ needs.preflight.outputs.admin_configured == 'true' && 'Admin API works' || 'Admin routes fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| рЯТЊ UPSTASH_REDIS | ${{ needs.preflight.outputs.upstash_configured == 'true' && 'вЬЕ Configured' || 'вЭМ Missing' }} | ${{ needs.preflight.outputs.upstash_configured == 'true' && 'Caching/rate-limit works' || 'No Redis cache' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| рЯ§Ц GEMINI_API_KEY | ${{ needs.preflight.outputs.gemini_configured == 'true' && 'вЬЕ Configured' || 'вЪ†пЄП Missing (dictionary-only)' }} | ${{ needs.preflight.outputs.gemini_configured == 'true' && 'AI translation on' || 'Translation limited' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configured:** ${{ needs.preflight.outputs.configured_count }}/${{ needs.preflight.outputs.total_count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Missing (required):** ${{ needs.preflight.outputs.missing_count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Missing (optional):** ${{ needs.preflight.outputs.optional_missing_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### рЯУ¶ Services Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Status | Build Time |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|--------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| вШБпЄП Worker | https://dor-progress.banjays.workers.dev | ${{ needs.worker.result == 'success' && 'вЬЕ Deployed' || needs.worker.result == 'skipped' && 'вП≠пЄП Skipped' || 'вЭМ Failed' }} | ${{ needs.worker.outputs.build_time || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| рЯО® Frontend | https://dor-progress.web.app | ${{ needs.frontend.result == 'success' && 'вЬЕ Deployed' || needs.frontend.result == 'skipped' && 'вП≠пЄП Skipped' || 'вЭМ Failed' }} | ${{ needs.frontend.outputs.build_time || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### рЯФН Health Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | Expected |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | ${{ needs.monitoring-check.result == 'success' && 'вЬЕ Healthy' || 'вЪ†пЄП Check logs' }} | HTTP 200 |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker API | ${{ needs.monitoring-check.result == 'success' && 'вЬЕ Healthy' || 'вЪ†пЄП Check logs' }} | HTTP 200 |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.monitoring-check.result == 'success' && 'вЬЕ Healthy' || 'вЪ†пЄП Check logs' }} | HTTP 200 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.monitoring-check.result }}" = "success" ]; then
            echo "вЬЕ All services are healthy and operational." >> $GITHUB_STEP_SUMMARY
          else
            echo "вЪ†пЄП Some services may still be initializing. Monitor: https://uptimerobot.com/ZaSzISaXMt" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### рЯЫ†пЄП Diagnostic Commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "```bash" >> $GITHUB_STEP_SUMMARY
          echo "# Check worker configuration" >> $GITHUB_STEP_SUMMARY
          echo "curl -H \"X-Admin-Secret: YOUR_SECRET\" https://dor-progress.banjays.workers.dev/api/admin/config-check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Test translation endpoint" >> $GITHUB_STEP_SUMMARY
          echo "curl \"https://dor-progress.banjays.workers.dev/api/translate?text=Hello&targetLang=ne\"" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY

      - name: Create Git tag and push
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin --tags

      - name: Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: v$(node -p "require('./package.json').version")
          name: Release v$(node -p "require('./package.json').version")
          body: |
            **Deployment Information**
            - **Timestamp:** ${{ github.run_started_at }}
            - **Build Version:** v$(node -p "require('./package.json').version")
            - **Triggered By:** ${{ github.actor }}
            - **Deploy Target:** ${{ github.event.inputs.deploy_target || 'all' }}
            - **Environment:** ${{ github.event.inputs.environment || 'prod' }}

            **Services**
            - Worker: https://dor-progress.banjays.workers.dev
            - Frontend: https://dor-progress.web.app

            **Monitoring**
            - UptimeRobot: https://uptimerobot.com/ZaSzISaXMt
