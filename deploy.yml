name: Deploy DoR Progress Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Inject Build Metadata into Frontend
        run: |
          sed -i "s|__API_BASE_URL__|${{ secrets.API_BASE_URL }}|g" index.html
          sed -i "s|__API_BASE_URL__|${{ secrets.API_BASE_URL }}|g" sw.v2.js
          sed -i "s|__BUILD_ID__|${{ github.run_id }}-${{ github.run_number }}|g" index.html
          sed -i "s|__BUILD_ID__|${{ github.run_id }}-${{ github.run_number }}|g" sw.v2.js
          sed -i "s|__COMMIT_SHA__|${{ github.sha }}|g" index.html
          sed -i "s|__COMMIT_SHA__|${{ github.sha }}|g" sw.v2.js

      - name: Sync Secrets to Cloudflare
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # List all secrets to be uploaded
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PROJECT_NUMBER: ${{ secrets.FIREBASE_PROJECT_NUMBER }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLOUD_API_KEY: ${{ secrets.GOOGLE_CLOUD_API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BUILD_ID: "${{ github.run_id }}-${{ github.run_number }}"
          COMMIT_SHA: ${{ github.sha }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          for secret in UPSTASH_REDIS_REST_URL UPSTASH_REDIS_REST_TOKEN FIREBASE_API_KEY FIREBASE_AUTH_DOMAIN FIREBASE_PROJECT_ID FIREBASE_PROJECT_NUMBER FIREBASE_APP_ID RECAPTCHA_SITE_KEY RECAPTCHA_SECRET_KEY PUBLISHED_SHEET_ID VAPID_PUBLIC_KEY VAPID_PRIVATE_KEY GEMINI_API_KEY GOOGLE_CLOUD_API_KEY API_BASE_URL BUILD_ID COMMIT_SHA ADMIN_SECRET; do
            echo "Pushing secret: $secret"
            echo "${!secret}" | npx wrangler secret put "$secret"
          done

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}