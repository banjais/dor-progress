name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  setup:
    name: 🏗️ Setup & Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

  secrets_check:
    name: 🔐 Secrets Validation
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: true # Shows failure in graph but doesn't block 'frontend' or 'backend'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Verify GitHub & Cloudflare Secrets
        id: verify-secrets
        run: npx tsx scripts/setup-secrets.js
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
          # Pass other required secrets here to let setup-secrets.js verify them
      - name: Notify Slack on Secrets Failure
        if: steps.verify-secrets.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Capture Markdown summary and escape for JSON payload
          SUMMARY_JSON=$(cat $GITHUB_STEP_SUMMARY | jq -Rs .)
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\": \"🛑 *Secrets Validation Failed*\", \"attachments\": [{\"text\": $SUMMARY_JSON, \"color\": \"#FF0000\"}]}" \
          $SLACK_WEBHOOK_URL

  system_health:
    name: 🏥 System Health & Diagnostics
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Run Project Diagnostics
        run: npx tsx scripts/project-info.ts
      - name: Infrastructure Health Check
        run: npm run info

  frontend:
    name: 🎨 Frontend (Build & Localization)
    needs: [setup, secrets_check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Sync Translations (Google Sheets)
        run: npx tsx scripts/sync-sheets.js
        env:
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
      - name: Verify Translation Integrity
        run: npm test -- translations
      - name: Run Frontend Type Checks
        run: npx tsc --noEmit
      - name: Build Frontend Assets
        run: npm run build

  backend:
    name: ⚙️ Backend (Security & Workers)
    needs: [setup, secrets_check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Cache Worker Build
        uses: actions/cache@v4
        with:
          path: |
            .wrangler
            .build
          key: worker-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            worker-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
      - name: Security Vulnerability Scan
        run: npm run security-check
      - name: Build & Finalize Service Worker
        run: |
          npm run build
          node scripts/finalize-build.js
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
      - name: Verify Build Artifacts
        run: node scripts/verify-build.js

  firebase:
    name: 🔥 Firebase (Rules & Hosting)
    needs: [setup, secrets_check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Verify Security Rules
        run: |
          # Start emulator and run a dry-run/syntax check on rules
          # If you have specific unit tests for rules, replace the command inside quotes
          # with "npm run test:rules"
          npx firebase emulators:exec "npx firebase deploy --only firestore:rules --dry-run" --only firestore
      - name: Firebase Pre-deploy Prep
        run: |
          # Add firebase specific build steps here
          echo "Preparing Firebase environment..."

  deploy:
    name: 🚀 Production Deploy
    needs: [frontend, backend, firebase, system_health]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare & Firebase
        run: |
          echo "Deploying version $(node -p "require('./package.json').version")"
          # Add your actual wrangler/firebase deploy commands here
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      - name: Tag Release
        run: node scripts/commit-version.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post_deployment_health:
    name: 🩺 Live Health Check
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Health Script
        run: bash scripts/health-check.sh
        env:
          APP_URL: "https://dor-progress.web.app"