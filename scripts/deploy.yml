name: Production Deployment

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Run Unit Tests
        run: npm test
        # Add a command here to run your unit tests (e.g., `npm test`, `jest`, `vitest run`)

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          WORKER_BASE: ${{ secrets.WORKER_BASE }}

      - name: Deploy to Cloudflare Pages
        id: cloudflare_pages_deploy # Add an ID to reference outputs
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'dor-progress-dashboard'
          directory: 'dist'
          # Branch pushes create a 'staging' preview; Tags deploy to the production environment
          branch: ${{ github.ref_type == 'tag' && 'main' || 'staging' }}

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy src/worker.ts --name ${{ github.ref_type == 'tag' && 'dor-progress-api' || 'dor-progress-api-staging' }}

      - name: Archive production artifacts
        if: github.ref_type == 'tag'
        run: |
          cd dist
          zip -r ../dor-progress-v${{ github.ref_name }}.zip .
          cd ..

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: dor-progress-v${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Slack Notification (Staging)
        if: github.ref_type != 'tag' && success() # Only for staging deployments and if previous steps succeeded
        uses: slackapi/slack-github-action@v1.26.0
        with:
          # Slack channel id, channel name, or user id to post message.
          # See also: https://api.slack.com/methods/chat.postMessage#channels
          channel-id: '#your-slack-channel' # Replace with your Slack channel ID or name
          slack-message: |
            🚀 Staging deployment for `${{ github.ref_name }}` completed!
            Cloudflare Pages URL: ${{ steps.cloudflare_pages_deploy.outputs.url }}
            Commit: <${{ github.event.compare }}|${{ github.sha }}>
            Triggered by: ${{ github.actor }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}