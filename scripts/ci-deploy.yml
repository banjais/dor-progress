name: CI/CD Deployment

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Build, Deploy and Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Build Preparations
        run: |
          npx tsx scripts/project-info.ts
          node scripts/sync-sheets.js
        env:
          # If sync-sheets.js requires specific credentials, add them to your GitHub Secrets
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Quality Gates (Type Check & Test)
        run: |
          npx tsc --noEmit
          npm test

      - name: Build Application
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: dor-progress

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Post-Deployment Health Check
        env:
          APP_URL: "https://dor-progress.web.app"
        run: |
          chmod +x ./scripts/health-check.sh
          ./scripts/health-check.sh