name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preflight:
    name: 🔒 Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2

      - name: Block Committed Secrets
        run: |
          if git ls-files | grep -qE 'firebase-adminsdk.*\.json$'; then
            echo "❌ Firebase service account committed!" && exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Get Version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

  build:
    name: 🏗️ Build
    needs: preflight
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: .build/

  deploy-worker:
    name: ☁️ Deploy Worker
    needs: [preflight, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-firebase:
    name: 🔥 Deploy Firebase
    needs: [preflight, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/download-artifact@v4
        with: { name: build-artifacts }
      - run: npx firebase deploy --only hosting --project dor-progress
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  summary:
    name: 📋 Summary
    needs: [preflight, build, deploy-worker, deploy-firebase]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Final Summary
        run: |
          echo "# 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ needs.preflight.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: Completed" >> $GITHUB_STEP_SUMMARY