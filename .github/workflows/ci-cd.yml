name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'

env:
  FIREBASE_PROJECT: "dor-progress"
  REPO_NAME: ${{ github.repository }}
  APP_URL: "https://dor-progress.web.app"

jobs:
  security-and-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: 🛡️ Scan for Hardcoded Secrets
        run: |
          # Check for common patterns that shouldn't be in code (e.g., API keys, Private Keys)
          if grep -rE "AIzaSy[A-Za-z0-9_-]{35}|[0-9a-fA-F]{32}|-----BEGIN PRIVATE KEY-----" ./src ./scripts; then
            echo "::error::Potential hardcoded secrets found in source or scripts!" && exit 1
          fi

      - name: 🔑 Validate Environment Secrets
        run: |
          echo "### 🔐 Secret Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status | Impact |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          
          check_val() {
            if [ -z "$2" ]; then
              echo "| $1 | ❌ FAIL | $3 |" >> $GITHUB_STEP_SUMMARY
              return 1
            fi
            echo "| $1 | ✅ OK | Ready |" >> $GITHUB_STEP_SUMMARY
            return 0
          }

          ERR=0
          check_val "PUBLISHED_SHEET_ID" "${{ secrets.PUBLISHED_SHEET_ID }}" "UI translations & Gemini fingerprinting will fail" || ERR=1
          check_val "CLOUDFLARE_API_TOKEN" "${{ secrets.CLOUDFLARE_API_TOKEN }}" "Cloudflare Worker deployment will fail" || ERR=1
          check_val "UPSTASH_REDIS_REST_URL" "${{ secrets.UPSTASH_REDIS_REST_URL }}" "Redis/Cache features will fail" || ERR=1
          check_val "UPSTASH_REDIS_REST_TOKEN" "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" "Redis/Cache features will fail" || ERR=1
          check_val "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}" "AI Summary generation will be disabled" || ERR=1
          check_val "ADMIN_SECRET" "${{ secrets.ADMIN_SECRET }}" "Security/Admin routes will be inaccessible" || ERR=1
          
          if [ -n "${{ secrets.FIREBASE_TOKEN }}" ] || [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "| FIREBASE_AUTH | ✅ OK | |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| FIREBASE_AUTH | ❌ FAIL | Firebase Hosting deployment fails" >> $GITHUB_STEP_SUMMARY
            ERR=1
          fi

          if [ $ERR -eq 1 ]; then
            echo "::error title=Missing Secrets::One or more secrets are missing. Deployment stopped. View the Workflow Summary for details."
            exit 1
          fi

      - name: Security Audit
        run: npm run security-check || echo "Security check failed"

  backend-check:
    needs: security-and-validation
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint & Typecheck Backend
        run: npm run lint
      - name: Test Backend
        run: npm test
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

  frontend-check:
    needs: security-and-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      
      - name: 🌐 Sync Translations
        run: node scripts/sync-sheets.js
        env:
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}

      - name: Build Frontend
        run: npm run build

  deploy-backend:
    needs: backend-check
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && secrets.CLOUDFLARE_API_TOKEN != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare (Backend)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-frontend:
    needs: frontend-check
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (secrets.FIREBASE_SERVICE_ACCOUNT != '' || secrets.FIREBASE_TOKEN != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

       - name: Deploy to Firebase (Frontend)
         run: |
           if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
             npx -y firebase-tools@latest deploy --only hosting --project ${{ env.FIREBASE_PROJECT }} --public .build --non-interactive
           else
             npx -y firebase-tools@latest deploy --only hosting --project ${{ env.FIREBASE_PROJECT }} --public .build --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
           fi