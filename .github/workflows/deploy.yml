name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent concurrent deployments that could cause Git tag/push conflicts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Orchestrated Deployment
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Essential for scripts/deploy.js to push version tags

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch tags and history for versioning logic

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Run Deployment Script
        env:
          # Flags for scripts/deploy.js
          ALLOW_CI_PUSH: 'true'
          
          # Authentication for deployment jobs
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

          # Firebase Service Account for secure deployment
          # The content of this secret will be written to a temporary file
          # and its path will be set as GOOGLE_APPLICATION_CREDENTIALS.
          # This is crucial for `firebase deploy` to authenticate.
          FIREBASE_SERVICE_ACCOUNT_KEY_CONTENT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

          # Context variables used by update-version.js and deploy.js
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Write the service account key to a temporary file
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY_CONTENT" > firebase-service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/firebase-service-account.json
          node scripts/deploy.js

      - name: Clean up Firebase Service Account Key
        if: always() # Ensure this step runs even if previous steps fail
        run: rm -f firebase-service-account.json