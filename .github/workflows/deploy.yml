name: CI & Deploy - DoR Progress

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:      # Allows manual trigger from GitHub UI

permissions:
  contents: write
  id-token: write

env:
  NODE_OPTIONS: "--no-deprecation"

jobs:
  # 1. Secrets Check
  validate-secrets:
    name: 🔐 Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check Required Secrets
        run: |
          echo "✅ CLOUDFLARE_API_TOKEN     : ${{ secrets.CLOUDFLARE_API_TOKEN != '' && 'SET' || 'MISSING' }}"
          echo "✅ FIREBASE_SERVICE_ACCOUNT : ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' && 'SET' || 'MISSING' }}"

  # 2. Code Quality
  lint-and-test:
    name: 🧹 Lint & Typecheck
    needs: validate-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  # 3. Security Audit
  security-audit:
    name: 🔒 Security Audit
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Security Audit
        run: node --no-deprecation scripts/audit-check.js

  # 4. Build Frontend
  build:
    name: 🏗️ Build Frontend
    needs: [lint-and-test, security-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  # 5. Deploy (Worker + Hosting)
  deploy:
    name: 🚀 Deploy Production
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Run Full Deployment Script
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_SHA: ${{ github.sha }}
          ALLOW_CI_PUSH: 'true'
        run: node --no-deprecation scripts/deploy.js