name: MeroSadak PRO Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Select deploy target"
        required: true
        default: "all"
        type: choice
        options: [all, worker, frontend]
      environment:
        description: "Environment"
        required: true
        default: "prod"
        type: choice
        options: [dev, staging, prod]

env:
  NODE_VERSION: "20"
  NODE_NO_WARNINGS: 1

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # PRE-FLIGHT CHECKS
  # ============================================================
  preflight:
    name: 🔍 Secrets Check
    runs-on: ubuntu-latest
    outputs:
      secrets_status: ${{ steps.check.outputs.status }}
      worker_ok: ${{ steps.check.outputs.worker_ok }}
      firebase_ok: ${{ steps.check.outputs.firebase_ok }}
      admin_ok: ${{ steps.check.outputs.admin_ok }}
      upstash_ok: ${{ steps.check.outputs.upstash_ok }}
      gemini_ok: ${{ steps.check.outputs.gemini_ok }}
      missing: ${{ steps.check.outputs.missing }}
      configured: ${{ steps.check.outputs.configured }}
      total: ${{ steps.check.outputs.total }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Check Secrets
        id: check
        run: |
          MISSING=0; CONFIGURED=0; TOTAL=0

          check_secret() {
            local name="$1"
            local value="$2"
            TOTAL=$((TOTAL+1))
            if [ -n "$value" ]; then
              echo "✅ $name"
              CONFIGURED=$((CONFIGURED+1))
            else
              echo "❌ $name"
              MISSING=$((MISSING+1))
            fi
          }

          check_secret "CLOUDFLARE_API_TOKEN" "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          check_secret "FIREBASE_SERVICE_ACCOUNT" "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          check_secret "ADMIN_SECRET" "${{ secrets.ADMIN_SECRET }}"
          check_secret "UPSTASH_REDIS_REST_URL" "${{ secrets.UPSTASH_REDIS_REST_URL }}"
          check_secret "UPSTASH_REDIS_REST_TOKEN" "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          check_secret "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}"
          check_secret "FIREBASE_APP_ID" "${{ secrets.FIREBASE_APP_ID }}"

          echo "status=$([ $MISSING -eq 0 ] && echo ready || echo missing)" >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT
          echo "configured=$CONFIGURED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

  # ============================================================
  # WORKER DEPLOY
  # ============================================================
  worker:
    name: ☁️ Worker
    runs-on: ubuntu-latest
    needs: preflight
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'worker' ||
      github.event_name == 'workflow_dispatch'

    outputs:
      status: ${{ steps.deploy.outputs.status }}
      deployment_url: ${{ steps.verify.outputs.deployment_url }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Security audit
        run: npm run security-check

      - name: Type check (TypeScript)
        run: npm run lint

      - name: Run tests
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm test

      - name: Build Worker (compile TypeScript)
        run: npm run compile

      - name: Deploy to Cloudflare (no-cache)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --no-cache
        env:
          BUILD_ID: v$(node -p "require('./package.json').version")
          COMMIT_SHA: ${{ github.sha }}
          DEPLOY_TIMESTAMP: ${{ github.run_started_at }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_NUMBER: ${{ secrets.FIREBASE_PROJECT_NUMBER }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          GOOGLE_CLOUD_API_KEY: ${{ secrets.GOOGLE_CLOUD_API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        continue-on-error: false

      - name: Verify worker
        id: verify
        if: steps.deploy.outcome == 'success'
        run: |
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://dor-progress.banjays.workers.dev || echo 000)
            if [ "$CODE" = "200" ] || [ "$CODE" = "404" ]; then
              echo "deployment_url=https://dor-progress.banjays.workers.dev" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 5
          done
          echo "deployment_url=https://dor-progress.banjays.workers.dev" >> $GITHUB_OUTPUT

  # ============================================================
  # FRONTEND DEPLOY
  # ============================================================
  frontend:
    name: 🎨 Frontend
    runs-on: ubuntu-latest
    needs: preflight
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'frontend' ||
       github.event_name == 'workflow_dispatch'

    outputs:
      status: ${{ steps.firebase.outputs.status }}
      deployment_url: ${{ steps.verify_firebase.outputs.deployment_url }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Deploy Firebase
        id: firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: ${{ github.event.inputs.environment == 'dev' && 'dev' || 'live' }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_CLI_PREV: 1
        continue-on-error: false

      - name: Verify Firebase
        id: verify_firebase
        if: steps.firebase.outcome == 'success'
        run: |
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://dor-progress.web.app || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "deployment_url=https://dor-progress.web.app" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 5
          done
          echo "deployment_url=https://dor-progress.web.app" >> $GITHUB_OUTPUT

  # ============================================================
  # MONITORING CHECK
  # ============================================================
  monitoring:
    name: 📊 Health Check
    runs-on: ubuntu-latest
    needs: [worker, frontend]
    if: always()

    steps:
      - name: Probe services
        run: |
          echo "=== Health Probes ==="
          for url in \
            "https://dor-progress.banjays.workers.dev/api/translate?text=test&targetLang=ne" \
            "https://dor-progress.banjays.workers.dev/api/admin/config-check" \
            "https://dor-progress.web.app"; do
            echo -n "$url: "
            curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000"
          done

  # ============================================================
  # DEPLOY SUMMARY
  # ============================================================
  summary:
    name: 📝 Summary
    runs-on: ubuntu-latest
    needs: [preflight, worker, frontend, monitoring]
    if: always()

    steps:
      - name: Build summary
        run: |
          echo "## 🚀 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** ${{ github.event.inputs.deploy_target || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Env:** ${{ github.event.inputs.environment || 'prod' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-----|" >> $GITHUB_STEP_SUMMARY
           echo "| Worker | ${{ needs.worker.result == 'success' && '✅' || '❌' }} | ${{ needs.worker.outputs.deployment_url }} |" >> $GITHUB_STEP_SUMMARY
           echo "| Frontend | ${{ needs.frontend.result == 'success' && '✅' || '❌' }} | ${{ needs.frontend.outputs.deployment_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Actions: https://github.com/${{ github.repository }}/actions" >> $GITHUB_STEP_SUMMARY
