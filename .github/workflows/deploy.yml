name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump-type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      commit-message:
        description: 'Commit message'
        required: false
        default: ''
        type: string
      skip-tests:
        description: 'Skip tests?'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    name: 🔒 Preflight Checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_msg: ${{ steps.commit_msg.outputs.msg }}
      api_base_url: ${{ steps.api_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install
        run: npm ci

      - name: 🔐 Validate Secrets
        id: validate-secrets
        run: |
          echo "🔍 Checking required secrets..."
          REQUIRED=(CLOUDFLARE_API_TOKEN UPSTASH_REDIS_REST_URL UPSTASH_REDIS_REST_TOKEN GEMINI_API_KEY ADMIN_SECRET FIREBASE_TOKEN)
          for s in "${REQUIRED[@]}"; do
            if [ -z "${!s}" ]; then
              echo "❌ Missing: $s"
              echo "missing=true" >> $GITHUB_OUTPUT
              exit 1
            fi
          done
          echo "✅ All secrets present"
          echo "missing=false" >> $GITHUB_OUTPUT

      - name: 🛡️ Security Audit
        run: npm run security-check

      - name: 🔍 Type Check
        run: npm run lint

      - name: 🧪 Run Tests
        if: ${{ github.event.inputs.skip-tests != 'true' }}
        run: npm test
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 📊 Determine Version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ github.event.inputs.bump-type || 'patch' }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "New version: $NEW"

      - name: 💬 Commit Message
        id: commit_msg
        run: |
          MSG="${{ github.event.inputs.commit-message }}"
          [ -z "$MSG" ] && MSG="Deploy v${{ steps.version.outputs.version }} (${{ github.event.inputs.bump-type || 'patch' }})"
          echo "msg=$MSG" >> $GITHUB_OUTPUT

      - name: 🔗 API Base URL
        id: api_url
        run: echo "url=https://dor-progress.banjays.workers.dev" >> $GITHUB_OUTPUT

  build:
    name: 🏗️ Build Project
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.missing == 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install
        run: npm ci

      - name: 🏗️ Build
        run: npm run build
        env:
          API_BASE_URL: ${{ needs.preflight.outputs.api_base_url }}

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            .build/
            dist/
          retention-days: 7

      - name: ✅ Verify Build
        run: |
          echo "Build artifacts:"
          ls -la .build/
          grep -q "${{ needs.preflight.outputs.api_base_url }}" .build/index.html && echo "✅ Injected API_BASE_URL"
          grep -q "${{ needs.preflight.outputs.version }}" .build/index.html && echo "✅ Injected BUILD_ID"

  deploy-worker:
    name: ☁️ Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [preflight, build]

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install
        run: npm ci

      - name: 🚀 Deploy
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          API_BASE_URL: ${{ needs.preflight.outputs.api_base_url }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PROJECT_NUMBER: ${{ secrets.FIREBASE_PROJECT_NUMBER }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}

      - name: 💓 Health Check
        run: |
          URL="${{ needs.preflight.outputs.api_base_url }}"
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            [ "$CODE" = "200" ] && echo "✅ Worker OK ($CODE)" && exit 0
            echo "⏳ Retry $i... $CODE"
            sleep 5
          done
          echo "❌ Worker failed"
          exit 1

  deploy-firebase:
    name: 🔥 Deploy Firebase Hosting
    runs-on: ubuntu-latest
    needs: [preflight, build, deploy-worker]

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install
        run: npm ci

      - name: 🔧 Install Firebase
        run: npm install -g firebase-tools

      - name: 🔥 Deploy
        run: |
          firebase deploy \
            --only hosting \
            --public .build \
            --project "${{ secrets.FIREBASE_PROJECT_ID || 'dor-progress' }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: ✅ Verify
        run: |
          URL="https://dor-progress.web.app"
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            [ "$CODE" = "200" ] && echo "✅ Firebase OK ($CODE)" && exit 0
            echo "⏳ Retry $i... $CODE"
            sleep 10
          done
          echo "❌ Firebase failed"
          exit 1

  commit-tag:
    name: 🏷️ Commit & Tag
    runs-on: ubuntu-latest
    needs: [preflight, deploy-worker, deploy-firebase]
    if: ${{ always() && needs.deploy-worker.result == 'success' && needs.deploy-firebase.result == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install
        run: npm ci

      - name: 🔢 Bump Version
        run: |
          npm version ${{ github.event.inputs.bump-type || 'patch' }} --no-git-tag-version

      - name: 💾 Commit & Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $(node -p "require('./package.json').version")"
          git tag -a "v$(node -p "require('./package.json').version")" -m "Release v$(node -p "require('./package.json').version")"
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: 📋 Deployment Summary
    runs-on: ubuntu-latest
    needs: [preflight, build, deploy-worker, deploy-firebase, commit-tag]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          STATUS_WORKER="${{ needs.deploy-worker.result }}"
          STATUS_FIREBASE="${{ needs.deploy-firebase.result }}"
          STATUS_COMMIT="${{ needs.commit-tag.result }}"

          echo "# 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ☁️ Cloudflare Worker | https://dor-progress.banjays.workers.dev | $STATUS_WORKER |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔥 Firebase Hosting | https://dor-progress.web.app | $STATUS_FIREBASE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.preflight.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Secrets Check" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.preflight.outputs.missing }}" = "false" ]; then
            echo "- ✅ All secrets configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Missing: ${{ needs.preflight.outputs.missing }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Worker Logs](https://console.cloudflare.com/workers-and-pages/overview)" >> $GITHUB_STEP_SUMMARY
          echo "- [Firebase Console](https://console.firebase.google.com/project/dor-progress/overview)" >> $GITHUB_STEP_SUMMARY
          echo "- [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
