name: Build and Deploy

on:
  push:
    branches:
      - '**' # Run checks on any branch
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.environment || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Firebase Service Account
        shell: bash
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT is missing!"
            exit 1
          fi
          node -e "JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT); console.log('✅ Firebase secret is valid JSON')"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Validate Cloudflare Token
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is missing!"
            exit 1
          fi
          echo "✅ Cloudflare API Token is present."

  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - run: npm run typecheck:worker
      - run: npm run lint && npm run typecheck

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - run: node scripts/audit-check.js

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - run: npm run clean
      - run: npm run build
        env:
          VITE_WORKER_BASE: ${{ secrets.VITE_WORKER_BASE }}
          VITE_FIREBASE_URL: ${{ secrets.VITE_FIREBASE_URL }}
          VITE_APP_ENV: ${{ github.event.inputs.environment || 'production' }}

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-frontend
    if: (github.ref_name == 'main' || github.ref_name == 'production' || github.event_name == 'workflow_dispatch') && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Deployment Script
        env:
          ALLOW_CI_PUSH: "true"
          SKIP_PRE_DEPLOY_CHECKS: "true"
          GITHUB_TOKEN: ${{ github.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          SNAPSHOT_KEY: ${{ secrets.SNAPSHOT_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VITE_WORKER_BASE: ${{ secrets.VITE_WORKER_BASE }}
          VITE_FIREBASE_URL: ${{ secrets.VITE_FIREBASE_URL }}
          VITE_APP_ENV: ${{ github.event.inputs.environment || 'production' }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > firebase-service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS="${{ github.workspace }}/firebase-service-account.json"
          
          node scripts/deploy.js

      - name: Ensure Single Commit Push
        if: always()
        run: |
          if [[ -z $(git status --porcelain) ]]; then
            echo "No changes detected. Creating 'Everything is up to date' commit..."
            git commit --allow-empty -m "Everything is up to date [skip ci]" || true
          else
            echo "Changes detected. Committing..."
            git add -A
            git commit -m "chore: deploy update [skip ci]" || true
          fi
          
          git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Cleanup
        if: always()
        run: rm -f firebase-service-account.json