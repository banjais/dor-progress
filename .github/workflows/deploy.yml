worker:
  name: ☁️ Worker Deploy (Safe Mode)
  runs-on: ubuntu-latest
  needs: preflight

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run tests (block deploy if failing)
      run: npm test
      env:
        ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Build project
      run: npm run build

    - name: Verify build output
      run: |
        if [ ! -d "dist" ]; then
          echo "❌ Build failed: dist missing"
          exit 1
        fi

    - name: Install Wrangler
      run: npm install -g wrangler

    - name: Deploy Worker (secure mode)
      run: wrangler deploy
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
        UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

    - name: Strict Health Check
      run: |
        for i in 1 2 3 4 5; do
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://dor-progress.banjays.workers.dev)

          if [ "$CODE" = "200" ]; then
            echo "✅ Worker OK"
            exit 0
          fi

          echo "Retry $i... status=$CODE"
          sleep 5
        done

        echo "❌ Worker failed health check"
        exit 1