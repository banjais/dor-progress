# .github/workflows/deploy.yml
name: Build and Deploy

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.environment || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Firebase Service Account
        shell: bash
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT is missing!"
            exit 1
          fi
          node -e "
            try {
              JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
              console.log('✅ Firebase service account is valid JSON');
            } catch (e) {
              console.error('❌ Invalid Firebase service account JSON');
              process.exit(1);
            }
          "
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Validate Cloudflare Token
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is missing!"
            exit 1
          fi
          echo "✅ Cloudflare API Token is present."

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate-secrets
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for git operations

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Full Deployment
        env:
          ALLOW_CI_PUSH: "true"
          SKIP_PRE_DEPLOY_CHECKS: "true"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          SNAPSHOT_KEY: ${{ secrets.SNAPSHOT_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VITE_WORKER_BASE: ${{ secrets.VITE_WORKER_BASE }}
          VITE_FIREBASE_URL: ${{ secrets.VITE_FIREBASE_URL }}
          VITE_APP_ENV: ${{ github.event.inputs.environment || 'production' }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          DEPLOY_MESSAGE: "chore(deploy): automated deployment"
        run: |
          # Prepare Firebase credentials for local usage
          echo "$FIREBASE_SERVICE_ACCOUNT" > firebase-service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS="${{ github.workspace }}/firebase-service-account.json"
          
          npm run deploy
        shell: bash

      - name: Cleanup
        if: always()
        run: rm -f firebase-service-account.json