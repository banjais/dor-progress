name: CI/CD Deployment

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dor-progress-production
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  deploy:
    name: Validate, Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Check Required Secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FB_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          AI_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          SNAP_KEY: ${{ secrets.SNAPSHOT_KEY }}
        run: |
          echo "Checking required GitHub Secrets..."
          test -n "$CF_TOKEN" || (echo "❌ Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CF_ID" || (echo "❌ Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$FB_SA" || (echo "❌ Missing FIREBASE_SERVICE_ACCOUNT" && exit 1)
          test -n "$AI_KEY" || (echo "❌ Missing GOOGLE_GENAI_API_KEY" && exit 1)
          test -n "$SNAP_KEY" || (echo "❌ Missing SNAPSHOT_KEY" && exit 1)
          echo "✅ All required secrets exist"

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Typecheck
        run: npm run typecheck

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Build Project
        env:
          VITE_WORKER_BASE: ${{ secrets.VITE_WORKER_BASE }}
          VITE_FIREBASE_URL: ${{ secrets.VITE_FIREBASE_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          firebaseToolsVersion: local