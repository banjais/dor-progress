name: MeroSadak PRO Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Select deploy target"
        required: true
        default: "all"
        type: choice
        options: [all, worker]
      environment:
        description: "Environment"
        required: true
        default: "prod"
        type: choice
        options: [dev, staging, prod]

env:
  NODE_VERSION: "20"
  NODE_NO_WARNINGS: 1

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

# ============================================================
# PRE-FLIGHT CHECKS
# ============================================================
  preflight:
    name: 🔍 Secrets Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Secrets
        id: check
        run: |
          MISSING=0

          check() {
            if [ -z "$2" ]; then
              echo "❌ $1"
              MISSING=$((MISSING+1))
            else
              echo "✅ $1"
            fi
          }

          check "CLOUDFLARE_API_TOKEN" "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          check "UPSTASH_REDIS_REST_URL" "${{ secrets.UPSTASH_REDIS_REST_URL }}"
          check "UPSTASH_REDIS_REST_TOKEN" "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          check "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}"
          check "ADMIN_SECRET" "${{ secrets.ADMIN_SECRET }}"

          if [ $MISSING -gt 0 ]; then
            echo "❌ Missing secrets: $MISSING"
            exit 1
          fi

# ============================================================
# WORKER DEPLOY
# ============================================================
  worker:
    name: ☁️ Worker Deploy
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (if exists)
        run: npm run build --if-present

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

      - name: Health Check
        run: |
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://dor-progress.banjays.workers.dev)
            if [ "$CODE" = "200" ]; then
              echo "✅ Worker healthy"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1