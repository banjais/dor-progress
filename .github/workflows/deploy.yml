name: CI/CD Deployment

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dor-progress-production
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:

  # ─────────────────────────────────────────────
  # 1. Validate Secrets
  # ─────────────────────────────────────────────

  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check Required Secrets
        run: |
          echo "Checking required GitHub Secrets..."

          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" || (echo "❌ Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" || (echo "❌ Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" || (echo "❌ Missing FIREBASE_SERVICE_ACCOUNT" && exit 1)
          test -n "${{ secrets.GOOGLE_GENAI_API_KEY }}" || (echo "❌ Missing GOOGLE_GENAI_API_KEY" && exit 1)
          test -n "${{ secrets.SNAPSHOT_KEY }}" || (echo "❌ Missing SNAPSHOT_KEY" && exit 1)

          echo "✅ All required secrets exist"

  # ─────────────────────────────────────────────
  # 2. Lint & Typecheck
  # ─────────────────────────────────────────────

  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    needs: validate-secrets

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Typecheck
        run: npm run typecheck

  # ─────────────────────────────────────────────
  # 3. Security Audit
  # ─────────────────────────────────────────────

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    needs: lint-typecheck

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────
  # 4. Build Frontend
  # ─────────────────────────────────────────────

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    needs: security-audit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dor-progress-dist
          path: dist

  # ─────────────────────────────────────────────
  # 5. Deploy Production
  # ─────────────────────────────────────────────

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest

    needs: build-frontend

    environment:
      name: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dor-progress-dist
          path: dist

      # ───────── Cloudflare Worker Deploy ─────────

      - name: Deploy Cloudflare Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          SNAPSHOT_KEY: ${{ secrets.SNAPSHOT_KEY }}

      # ───────── Firebase Hosting Deploy ─────────

      - name: Create Firebase Service Account File
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-service-account.json

      - name: Deploy Firebase Hosting
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=firebase-service-account.json
          npx firebase deploy --only hosting --non-interactive

      # ───────── Final Status ─────────

      - name: Deployment Summary
        run: |
          echo "🎉 Production deployment completed successfully"
          echo "✅ Cloudflare Worker deployed"
          echo "✅ Firebase Hosting deployed"