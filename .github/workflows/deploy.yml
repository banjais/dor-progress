name: MeroSadak PRO Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Select deploy target"
        required: true
        default: "all"
        type: choice
        options: [all, worker, frontend]
      environment:
        description: "Environment"
        required: true
        default: "prod"
        type: choice
        options: [dev, staging, prod]

env:
  NODE_VERSION: "20"
  NODE_NO_WARNINGS: 1

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # PRE-FLIGHT CHECKS
  # ============================================================
  preflight:
    name: 🔍 Secrets Check
    runs-on: ubuntu-latest
    outputs:
      secrets_status: ${{ steps.check.outputs.status }}
      worker_configured: ${{ steps.check.outputs.worker_ok }}
      firebase_configured: ${{ steps.check.outputs.firebase_ok }}
      admin_configured: ${{ steps.check.outputs.admin_ok }}
      upstash_configured: ${{ steps.check.outputs.upstash_ok }}
      gemini_configured: ${{ steps.check.outputs.gemini_ok }}
      missing: ${{ steps.check.outputs.missing }}
      configured: ${{ steps.check.outputs.configured }}
      total: ${{ steps.check.outputs.total }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Check Secrets
        id: check
        run: |
          MISSING=0; CONFIGURED=0; TOTAL=0

          check_secret() {
            local name="$1"
            local value="$2"
            local out_key="$3"
            TOTAL=$((TOTAL+1))
            if [ -n "$value" ]; then
              echo "✅ $name"
              CONFIGURED=$((CONFIGURED+1))
              [ -n "$out_key" ] && echo "$out_key=true" >> $GITHUB_OUTPUT
            else
              echo "❌ $name"
              MISSING=$((MISSING+1))
              [ -n "$out_key" ] && echo "$out_key=false" >> $GITHUB_OUTPUT
            fi
          }

          check_secret "CLOUDFLARE_API_TOKEN" "${{ secrets.CLOUDFLARE_API_TOKEN }}" "worker_ok"
          check_secret "FIREBASE_SERVICE_ACCOUNT" "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" "firebase_ok"
          check_secret "ADMIN_SECRET" "${{ secrets.ADMIN_SECRET }}" "admin_ok"
          check_secret "UPSTASH_REDIS_REST_URL" "${{ secrets.UPSTASH_REDIS_REST_URL }}" "upstash_ok"
          check_secret "UPSTASH_REDIS_REST_TOKEN" "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" ""
          check_secret "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}" "gemini_ok"
          check_secret "FIREBASE_PROJECT_ID" "${{ secrets.FIREBASE_PROJECT_ID }}" "firebase_ok"

          echo "status=$([ $MISSING -eq 0 ] && echo ready || echo missing)" >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT
          echo "configured=$CONFIGURED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

  # ============================================================
  # WORKER DEPLOY
  # ============================================================
  worker:
    name: ☁️ Worker
    runs-on: ubuntu-latest
    outputs:
      error_msg: ${{ steps.set_error.outputs.msg }}
      status: ${{ steps.deploy.outputs.status }}
      deployment_url: ${{ steps.verify.outputs.deployment_url }}
      timestamp: ${{ steps.get_version.outputs.TIMESTAMP }}
    needs: preflight
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'worker' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Install
        id: install
        run: npm ci

      - name: Security audit
        id: audit
        run: npm run security-check

      - name: Type check (TypeScript)
        id: lint
        run: npm run lint

      - name: Run tests
        id: test
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm test

      - name: Build Worker (compile TypeScript)
        run: npm run compile

      - name: Deploy to Cloudflare (no-cache)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --outdir=dist --no-cache
          vars: |
            BUILD_ID
            COMMIT_SHA
            DEPLOY_TIMESTAMP
            FIREBASE_PROJECT_ID
          secrets: |
            UPSTASH_REDIS_REST_URL
            UPSTASH_REDIS_REST_TOKEN
            GEMINI_API_KEY
            ADMIN_SECRET
            GOOGLE_CLOUD_API_KEY
            API_BASE_URL
            FIREBASE_API_KEY
            FIREBASE_AUTH_DOMAIN
            FIREBASE_APP_ID
            RECAPTCHA_SITE_KEY
            RECAPTCHA_SECRET_KEY
            PUBLISHED_SHEET_ID
            VAPID_PUBLIC_KEY
            VAPID_PRIVATE_KEY
        env:
          # Pass actual secrets to the environment for wrangler-action to pick them up
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          GOOGLE_CLOUD_API_KEY: ${{ secrets.GOOGLE_CLOUD_API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_NUMBER: ${{ secrets.FIREBASE_PROJECT_NUMBER }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        continue-on-error: false

      - name: Verify worker
        if: steps.deploy.outcome == 'success'
        id: verify
        run: |
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://dor-progress.banjays.workers.dev || echo 000)
            if [ "$CODE" = "200" ] || [ "$CODE" = "404" ]; then
              echo "deployment_url=https://dor-progress.banjays.workers.dev" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 5
          done
          echo "deployment_url=https://dor-progress.banjays.workers.dev" >> $GITHUB_OUTPUT

      - name: Set Error Output
        if: failure()
        id: set_error
        run: |
          if [[ "${{ steps.install.outcome }}" == "failure" ]]; then echo "msg=Dependency installation (npm ci) failed." >> $GITHUB_OUTPUT;
          elif [[ "${{ steps.test.outcome }}" == "failure" ]]; then echo "msg=Unit tests failed." >> $GITHUB_OUTPUT;
          elif [[ "${{ steps.lint.outcome }}" == "failure" ]]; then echo "msg=Type checking (lint) failed." >> $GITHUB_OUTPUT;
          elif [[ "${{ steps.deploy.outcome }}" == "failure" ]]; then echo "msg=Cloudflare Wrangler deployment failed." >> $GITHUB_OUTPUT;
          else echo "msg=Worker build or validation failed." >> $GITHUB_OUTPUT; fi

  # ============================================================
  # FRONTEND DEPLOY
  # ============================================================
  frontend:
    name: 🎨 Frontend
    runs-on: ubuntu-latest
    needs: preflight
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'frontend' ||
       github.event_name == 'workflow_dispatch'

    outputs:
      error_msg: ${{ steps.set_error_fe.outputs.msg }}
      status: ${{ steps.firebase.outputs.status }}
      deployment_url: ${{ steps.verify_firebase.outputs.deployment_url }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Deploy Firebase
        id: firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: ${{ github.event.inputs.environment == 'dev' && 'dev' || 'live' }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_CLI_PREV: 1
        continue-on-error: false

      - name: Verify Firebase
        id: verify_firebase
        if: steps.firebase.outcome == 'success'
        run: |
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://dor-progress.web.app || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "deployment_url=https://dor-progress.web.app" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 5
          done
          echo "deployment_url=https://dor-progress.web.app" >> $GITHUB_OUTPUT

      - name: Set Error Output (FE)
        if: failure()
        id: set_error_fe
        run: |
          if [[ "${{ steps.firebase.outcome }}" == "failure" ]]; then echo "msg=Firebase Hosting deployment failed." >> $GITHUB_OUTPUT;
          else echo "msg=Frontend build or verification failed." >> $GITHUB_OUTPUT; fi

  # ============================================================
  # MONITORING CHECK
  # ============================================================
  monitoring:
    name: 📊 Health Check
    runs-on: ubuntu-latest
    needs: [worker, frontend]
    if: always()

    steps:
      - name: Probe services
        run: |
          echo "=== Health Probes ==="
          for url in \
            "https://dor-progress.banjays.workers.dev/api/translate?text=test&targetLang=ne" \
            "https://dor-progress.banjays.workers.dev/api/admin/config-check" \
            "https://dor-progress.web.app"; do
            echo -n "$url: "
            curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000"
          done

  # ============================================================
  # DEPLOY SUMMARY
  # ============================================================
  summary:
    name: 📝 Summary
    runs-on: ubuntu-latest
    needs: [preflight, worker, frontend, monitoring]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      RUN_STARTED_AT: ${{ github.run_started_at }}
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Extract Version
        id: version
        run: echo "VAL=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Calculate Run Time
        id: calc_time
        run: |
          START_TS=$(date -d "$RUN_STARTED_AT" +%s)
          NOW_TS=$(date +%s)
          DIFF=$((NOW_TS - START_TS))
          echo "DURATION=$((DIFF / 60))m $((DIFF % 60))s" >> $GITHUB_OUTPUT
        shell: bash

      - name: Notify Slack on success
        if: github.ref == 'refs/heads/main' && success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *Deployment Successful* for `${{ github.repository }}`",
              "attachments": [{
                "color": "#2eb886",
                "fields": [
                  { "title": "Version", "value": "v${{ steps.version.outputs.VAL }}", "short": true },
                  { "title": "Branch", "value": "`${{ github.ref_name }}`", "short": true },
                  { "title": "Duration", "value": "${{ steps.calc_time.outputs.DURATION }}", "short": true },
                  { "title": "Worker", "value": "https://dor-progress.banjays.workers.dev", "short": false },
                  { "title": "Frontend", "value": "https://dor-progress.web.app", "short": false },
                  { "title": "Logs", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Deployment Logs>", "short": false }
                ]
              }]
            }

      - name: Notify Slack on failure
        if: github.ref == 'refs/heads/main' && failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *Deployment Failed* for `${{ github.repository }}`",
              "attachments": [{
                "color": "#e01e5a",
                "fields": [
                  { "title": "Workflow", "value": "${{ github.workflow }}", "short": true },
                  { "title": "Branch", "value": "`${{ github.ref_name }}`", "short": true },
                  { "title": "Duration", "value": "${{ steps.calc_time.outputs.DURATION }}", "short": true },
                  { "title": "Worker Error", "value": "${{ needs.worker.outputs.error_msg || 'None' }}", "short": false },
                  { "title": "Frontend Error", "value": "${{ needs.frontend.outputs.error_msg || 'None' }}", "short": false },
                  { "title": "Action Logs", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Detailed Logs>", "short": false }
                ]
              }]
            }
      - name: Build summary
        run: |
          echo "## 🚀 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          VERSION=$(node -p "require('./package.json').version")
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** ${{ github.event.inputs.deploy_target || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Env:** ${{ github.event.inputs.environment || 'prod' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | ${{ needs.worker.result == 'success' && '✅' || '❌' }} | ${{ needs.worker.outputs.deployment_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result == 'success' && '✅' || '❌' }} | ${{ needs.frontend.outputs.deployment_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Actions: https://github.com/${{ github.repository }}/actions" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup old artifacts
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const now = new Date();
            const thirtyDaysAgo = new Date(now.setDate(now.getDate() - 30));

            const artifactsToDelete = [];
            const successfulOrCancelledArtifacts = [];

            for (const artifact of artifacts.filter(a => a.name.endsWith('-dist'))) {
              const createdAt = new Date(artifact.created_at);
              const conclusion = artifact.workflow_run.conclusion;

              if (['success', 'skipped', 'cancelled'].includes(conclusion)) {
                successfulOrCancelledArtifacts.push(artifact);
              } else if (conclusion === 'failure' && createdAt < thirtyDaysAgo) {
                artifactsToDelete.push(artifact); // Failed and older than 30 days
              }
            }

            // Sort successful/cancelled artifacts and keep only the 10 most recent
            successfulOrCancelledArtifacts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            artifactsToDelete.push(...successfulOrCancelledArtifacts.slice(10));
            
            // Ensure no duplicates if an artifact somehow ended up in both lists (unlikely with this logic)
            const toDelete = Array.from(new Set(artifactsToDelete.map(a => a.id)))
                               .map(id => artifactsToDelete.find(a => a.id === id));
            
            for (const artifact of toDelete) {
              console.log(`Deleting old artifact: ${artifact.name} (ID: ${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
