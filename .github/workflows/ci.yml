name: CI/CD Pipeline

on:
  # Triggers the workflow on push or pull request events to the main branch
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-env:
    name: 🔒 Environment Secrets Check
    # This job runs quickly and in parallel, ensuring critical secrets are present.
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare Token
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN is missing"
          else
            echo "Cloudflare API Token is set"
          fi
      - name: Check Firebase Service Account
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "::warning::FIREBASE_SERVICE_ACCOUNT is missing"
          else
            echo "Firebase Service Account is set"
          fi
  
  install-dependencies:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    # This job sets up Node.js and installs dependencies, caching them for subsequent jobs.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Upload node_modules as artifact
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: node_modules
          retention-days: 1 # Keep for a short period

  lint:
    name: 🧹 Lint Code
    needs: install-dependencies # Depends on dependencies being installed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules
      - name: Lint
        run: npm run lint

  typecheck:
    name: 🔍 Typecheck Code
    needs: install-dependencies # Depends on dependencies being installed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules
      - name: Typecheck
        run: npm run typecheck

  test:
    name: 🧪 Run Tests
    needs: install-dependencies # Depends on dependencies being installed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules
      - name: Test
        run: npm test

  build-frontend:
    name: 🏗️ Build Frontend
    # Now depends on lint, typecheck, and test to ensure code quality before building
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    # The build job will also need to install dependencies, but can leverage caching.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      # Download node_modules from the install-dependencies job
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Build project
        run: npm run build
        env:
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_API_BASE_URL: https://dor-progress.web.app
          WORKER_BASE: https://dor-progress.web.app
          VITE_APP_ENV: production

      - name: Debug Build Output
        run: |
          echo "Checking for build output..."
          ls -R dist
          echo "Verifying environment variable injection..."
          # This checks if the production API URL exists anywhere in the compiled JS assets
          grep -r "https://dor-progress.web.app" dist/assets/*.js || (echo "::error::VITE_API_BASE_URL not found in build!" && exit 1)

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist
          if-no-files-found: error
          retention-days: 1

  deploy-worker:
    name: 🚀 Deploy Worker
    # Depends on the CI checks passing and environment validation
    needs: [lint, typecheck, test, validate-env]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      
      # Download node_modules from the install-dependencies job
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Deploy Worker
        run: npx wrangler deploy
        # Ensure the worker is deployed with the correct name based on branch/tag
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: 🚀 Deploy Hosting (Production)
    needs: [build-frontend, validate-env]
    # Only deploy to production hosting on pushes to main
    if: github.ref == 'refs/heads/main' && success() # Ensure previous jobs succeeded
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # For Workload Identity Federation (Recommended):
          # workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
          # service_account: 'my-service-account@my-project.iam.gserviceaccount.com'
          # OR for existing JSON Secret (Cleaner than manual echo):
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist

      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --only hosting

  log-deployment:
    name: 📝 Log Deployment Status
    needs: [deploy-worker, deploy-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      
      # Download node_modules from the install-dependencies job
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      # This script likely needs access to node_modules for tsx
      - name: Log deployment
        run: npx tsx scripts/deploy/deploy-log.ts
        env:
          GITHUB_SHA: ${{ github.sha }}