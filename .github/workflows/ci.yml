name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-env:
    name: 🔒 Environment Secrets Check
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare Token
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN is missing"
          else
            echo "Cloudflare API Token is set"
          fi
      - name: Check Firebase Service Account
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "::warning::FIREBASE_SERVICE_ACCOUNT is missing"
          else
            echo "Firebase Service Account is set"
          fi

  ci:
    name: 🧪 CI (Lint + Typecheck + Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build-frontend:
    name: 🏗️ Build Frontend
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies (fallback)
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_API_BASE_URL: https://dor-progress.web.app
          # Ensure these match what your build script expects
          VITE_APP_ENV: production

      - name: Debug Build Output
        run: |
          echo "Checking for build output..."
          ls -R dist
          echo "Verifying environment variable injection..."
          # This checks if the production API URL exists anywhere in the compiled JS assets
          grep -r "https://dor-progress.web.app" dist/assets/*.js || (echo "::error::VITE_API_BASE_URL not found in build!" && exit 1)

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist
          if-no-files-found: error
          retention-days: 1

  deploy-worker:
    name: 🚀 Deploy Worker (Production)
    needs: [ci, validate-env]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Update npm and firebase-tools
        run: |
          npm install -g npm@latest
          npm install -g firebase-tools@latest

      - name: Install dependencies
        run: npm install

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: 🚀 Deploy Hosting (Production)
    needs: [build-frontend, validate-env]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # For Workload Identity Federation (Recommended):
          # workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
          # service_account: 'my-service-account@my-project.iam.gserviceaccount.com'
          # OR for existing JSON Secret (Cleaner than manual echo):
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --only hosting

  log-deployment:
    name: 📝 Log Deployment
    needs: [deploy-worker, deploy-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Log deployment
        run: npx tsx scripts/deploy/deploy-log.ts
        env:
          GITHUB_SHA: ${{ github.sha }}