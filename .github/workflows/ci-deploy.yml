name: CI/CD Deployment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  validate-translations:
    name: Translation Integrity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync and Verify Translations
        env:
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa_key.json
          GOOGLE_APPLICATION_CREDENTIALS=sa_key.json pnpm exec tsx scripts/sync-sheets.js
          rm sa_key.json
          pnpm test -- translations

      - name: Build Application
        run: pnpm build

      - name: Verify Build Output
        run: pnpm exec tsx scripts/verify-build.js

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .build
          retention-days: 1

  deploy:
    name: Build, Deploy and Health Check
    needs: validate-translations
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Security Audit
        run: pnpm run security-check || echo "⚠️ Security check completed with warnings"

      - name: Run Build Preparations
        run: |
          pnpm exec tsx scripts/project-info.ts
          node scripts/setup-secrets.js || true

      - name: Sync Translations from Google Sheets
        env:
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
        run: |
          # Write credentials to file so scripts/sync-sheets.js can find them
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa_key.json
          GOOGLE_APPLICATION_CREDENTIALS=sa_key.json pnpm exec tsx scripts/sync-sheets.js
          rm sa_key.json

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .build

      - name: Quality Gates (Type Check & Test)
        run: |
          pnpm exec tsc --noEmit
          pnpm test

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: dor-progress

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Post-Deployment Health Check
        env:
          APP_URL: "https://dor-progress.web.app"
        run: |
          chmod +x ./scripts/health-check.sh
          ./scripts/health-check.sh

      - name: Deployment Diagnostics
        run: |
          echo "✅ Deployment Summary"
          echo "Release Version: $(node -p "require('./package.json').version")"
          pnpm run info || true