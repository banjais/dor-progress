name: CI/CD Deployment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Deploy and Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify Secrets Presence
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then echo "❌ FIREBASE_SERVICE_ACCOUNT is missing"; exit 1; fi
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then echo "❌ CLOUDFLARE_API_TOKEN is missing"; exit 1; fi
          if [ -z "${{ secrets.PUBLISHED_SHEET_ID }}" ]; then echo "❌ PUBLISHED_SHEET_ID is missing"; exit 1; fi
          echo "✅ All required secrets are present."

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
        run: npm run security-check || echo "⚠️ Security check completed with warnings"

      - name: Run Build Preparations
        run: |
          npx tsx scripts/project-info.ts
          node scripts/setup-secrets.js || true

      - name: Sync Translations from Google Sheets
        env:
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
        run: |
          # Write credentials to file so scripts/sync-sheets.js can find them
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa_key.json
          GOOGLE_APPLICATION_CREDENTIALS=sa_key.json npx tsx scripts/sync-sheets.js
          rm sa_key.json

      - name: Quality Gates (Type Check & Test)
        run: |
          npx tsc --noEmit
          npm test

      - name: Build Application
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: dor-progress

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Post-Deployment Health Check
        env:
          APP_URL: "https://dor-progress.web.app"
        run: |
          chmod +x ./scripts/health-check.sh
          ./scripts/health-check.sh

      - name: Deployment Diagnostics
        run: |
          echo "✅ Deployment Summary"
          echo "Release Version: $(node -p "require('./package.json').version")"
          npm run info || true