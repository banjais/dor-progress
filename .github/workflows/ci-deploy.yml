name: CI/CD Deployment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  check-secrets:
    name: 🔐 Secrets Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate Environment Secrets
        run: pnpm exec tsx scripts/setup-secrets.js
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  frontend-verification:
    name: 🎨 Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Sync and Verify Translations
        env:
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa_key.json
          GOOGLE_APPLICATION_CREDENTIALS=sa_key.json pnpm exec tsx scripts/sync-sheets.js
          rm sa_key.json
          pnpm test -- translations
      - name: Upload Synced Translations
        uses: actions/upload-artifact@v4
        with:
          name: translations-json
          path: src/locales/translations.json
          retention-days: 1

  backend-verification:
    name: 🤖 Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify AI Registry
        run: pnpm exec tsx scripts/index.ts

  build:
    name: 🏗️ Build App
    needs: [frontend-verification, backend-verification]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Download Translations
        uses: actions/download-artifact@v4
        with:
          name: translations-json
          path: src/locales

      - name: Build Application
        run: pnpm build
      - name: Verify Build Output
        run: pnpm exec tsx scripts/verify-build.js
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .build
          retention-days: 1

  deploy:
    name: Build, Deploy and Health Check
    needs: [check-secrets]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality Gates (Type Check & Test)
        run: |
          pnpm exec tsc --noEmit
          pnpm test

      - name: Build Application
        run: pnpm build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: dor-progress

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Post-Deployment Health Check
        env:
          APP_URL: "https://dor-progress.web.app"
        run: |
          chmod +x ./scripts/health-check.sh
          ./scripts/health-check.sh

      - name: Deployment Diagnostics
        run: |
          echo "✅ Deployment Summary"
          echo "Release Version: $(node -p "require('./package.json').version")"
          pnpm run info || true
