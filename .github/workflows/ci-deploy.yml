name: CI/CD Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  security-audit:
    name: 🛡️ Security & Secrets Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Validate Environment Secrets
        run: npx tsx scripts/setup-secrets.js
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PUBLISHED_SHEET_ID: ${{ secrets.PUBLISHED_SHEET_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          APP_URL: https://dor-progress.web.app

      - name: Audit Dependencies
        run: npm audit --audit-level=high

      - name: Lint Workflows
        run: npm run lint:yaml

  quality-assurance:
    name: 🧪 Quality Assurance
    needs: security-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint Check
        run: npm run lint

      - name: Unit Tests
        run: npm test

  build-verification:
    name: 🏗️ Production Build Verification
    needs: quality-assurance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build
        env:
          VITE_COMMIT_SHA: ${{ github.sha }}
          API_BASE_URL: https://dor-progress.web.app
          VITE_API_BASE_URL: https://dor-progress.web.app

      - name: Verify Build Artifacts
        run: npx tsx scripts/verify-build.js

  deployment-registry:
    name: 🚀 Deployment Status Registry
    needs: build-verification
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Log Deployment Meta
        run: |
          echo "✅ Deployment verified for version: $(node -p "require('./package.json').version")"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
