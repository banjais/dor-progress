name: "Security Alert Notification"

on:
  code_scanning_alert: {}

permissions:
  security-events: read
  contents: read

jobs:
  email-on-high-severity:
    if: github.event.alert && (github.event.alert.security_severity_level == 'high' || github.event.alert.security_severity_level == 'critical')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "⚠️ High Severity Security Alert"
          to: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
          body: |
            Rule: ${{ github.event.alert.rule.description }}
            Severity: ${{ github.event.alert.security_severity_level }}
            Link: ${{ github.event.alert.html_url }}